name: Build and Deploy Portfolio
on:
  push:
    branches: ["main"]
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix Figma & Builder Dependencies
        run: |
          # package.json mein builder install aur react fix karna
          sed -i 's/"peerDependenciesMeta"/"dependencies": {"react": "18.3.1", "react-dom": "18.3.1", "@builder.io\/react": "latest"}, "peerDependenciesMeta"/g' package.json
          
      - name: Auto-Clean Editing Mode
        run: |
          # Figma ke editable text ko normal karna
          find src -type f -name "*.tsx" -exec sed -i 's/contentEditable={true}/contentEditable={false}/g' {} +
          find src -type f -name "*.tsx" -exec sed -i 's/contentEditable="true"/contentEditable="false"/g' {} +
          echo "* { outline: none !important; } [contenteditable='true'] { pointer-events: none !important; }" >> src/index.css || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          npm install --legacy-peer-deps
          npm run build
        env:
          # Yahan humne secret key ko code mein connect kiya hai
          VITE_BUILDER_PUBLIC_KEY: ${{ secrets.BUILDER_PUBLIC_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        
