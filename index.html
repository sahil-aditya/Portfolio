<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sam Visuals - Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Space Mono', monospace;
    }
    
    :root {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --muted-foreground: oklch(0.708 0 0);
    }
    
    body {
      background-color: var(--background);
      color: var(--foreground);
    }
    
    .masonry-grid {
      display: flex;
      gap: 16px;
    }

    .masonry-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    @media (max-width: 640px) {
      .masonry-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    
    @media (min-width: 768px) {
      .masonry-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .progressive-img {
      filter: blur(25px);
      transform: scale(1.05);
      opacity: 0.7;
      transition: filter .8s ease, transform .8s ease, opacity .8s ease;
    }

    .progressive-img.loaded {
      filter: blur(0);
      transform: scale(1);
      opacity: 1;
    }
    
    .dragging {
      opacity: 0.5;
    }
    
    .drag-over {
      outline: 2px dashed var(--foreground);
    }
    
    [contenteditable="true"] {
      outline: 2px solid var(--foreground);
      padding: 4px;
    }
    
    .image-viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.95);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }
    
    .image-viewer.active {
      display: flex;
    }
    
    .image-viewer img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      transition: transform 0.3s ease;
    }
    
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: var(--background);
      border: 2px solid var(--foreground);
      padding: 2rem;
      max-width: 400px;
      width: 90%;
    }
    /* Social Link Buttons – Normal state only */
   #socialLinks button {
     width: 36px;            /* button size */
     height: 36px;
     padding: 6px;
     border: none;           /* no border */
     border-radius: 8px;     /* rounded edges */
     display: flex;
     align-items: center;
     justify-content: center;
     background: transparent; /* transparent background */
     margin-right: 2px;      /* spacing between buttons */
   }

/* Icon inside button */
#socialLinks button img {
  width: 32px;            /* icon fits inside button */
  height: 32px;
  object-fit: contain;
      }
  </style>
</head>
<body>
  <!-- Admin Login Modal -->
  <div id="adminModal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl mb-4">[Are you admin?]</h2>
      <input type="password" id="adminPassword" placeholder="Enter password" class="w-full px-4 py-2 border-2 border-white bg-transparent text-white mb-4">
      <div class="flex gap-2">
        <button id="adminSubmit" class="flex-1 px-4 py-2 border-2 border-white hover:bg-white hover:text-black transition-colors">Login</button>
        <button id="adminCancel" class="flex-1 px-4 py-2 border-2 border-white hover:bg-white hover:text-black transition-colors">Cancel</button>
      </div>
      <p id="adminError" class="text-red-500 text-xs mt-2 hidden">Incorrect password</p>
    </div>
  </div>

  <!-- Edit Mode Indicator -->
  <div id="editModeIndicator" class="fixed top-6 left-6 px-4 py-2 border-2 border-green-500 bg-green-500 text-black text-sm z-50 hidden">
    [EDIT MODE ACTIVE]
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-[var(--background)] border-b-2 border-[var(--foreground)]">
    <div class="container mx-auto px-4 py-4">
      <h1 class="text-xl">|SAM Visuals</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto px-4 py-8 pb-32">
    <!-- Profile Header -->
    <div id="profileHeader" class="w-full aspect-[3/2] border-2 border-[var(--foreground)] bg-[var(--background)] p-6 md:p-8 relative mb-6">
      <!-- Admin Camera Icon - Bottom Left -->
      <button id="adminBtn" class="absolute bottom-4 left-4 p-2 border-2 border-white hover:bg-white hover:text-black transition-colors z-10" title="Admin Login">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
          <circle cx="12" cy="13" r="3"></circle>
        </svg>
      </button>
      
      <!-- Social Links - Top Right -->
      <div id="socialLinks" class="absolute top-4 right-4 flex gap-2 flex-wrap max-w-[200px] justify-end">
        <!-- Social links will be rendered here -->
      </div>
      
      <div class="h-full flex items-center gap-6">
        <!-- Profile Picture - Left -->
        <div class="flex-shrink-0">
          <div class="w-20 h-20 md:w-28 md:h-28 rounded-full border-2 border-[var(--foreground)] overflow-hidden cursor-pointer" id="profilePicContainer">
            <img id="profilePic" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400&h=400&fit=crop" alt="Profile" class="w-full h-full object-cover">
          </div>
        </div>

        <!-- Info -->
        <div class="flex-1 text-left">
          <h2 id="profileName" class="text-lg md:text-xl mb-2">SAM</h2>
          <p id="profileBio" class="text-xs md:text-sm text-[var(--muted-foreground)] leading-relaxed whitespace-pre-wrap">
                                                                                                                           •Photographer <br>
                                                                                                                           •Visual Artist <br> 
                                                                                                                            transformin RAW moments into Cinematic Visuals
                                                                                                                       </p>
        </div>
      </div>
    </div>

    <!-- Gallery Grid -->
    <div id="galleryGrid" class="masonry-grid">
      <div id="col1" class="masonry-column"></div>
      <div id="col2" class="masonry-column"></div>
    </div>

    <!-- Add Gallery Item Button (Edit Mode Only) -->
    <button id="addGalleryBtn" class="w-full mt-4 p-8 border-2 border-dashed border-[var(--foreground)] hover:bg-[var(--foreground)] hover:text-[var(--background)] transition-colors hidden">
      <span class="text-2xl">+</span>
      <p class="text-sm mt-2">[ADD NEW PROJECT]</p>
    </button>
    <button id="saveGalleryBtn" class="w-full mt-3 p-3 border border-green-500 text-green-400 hover:bg-green-500 hover:text-black transition-colors hidden">
      [SAVE CHANGES]
    </button>
  </main>

  <!-- Image Viewer -->
  <div id="imageViewer" class="image-viewer">
    <button id="closeViewer" class="absolute top-4 right-4 p-3 bg-white text-black hover:bg-gray-200 transition-colors border-2 border-white z-10">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    
    <button id="toggleViewerImage" class="absolute top-4 left-4 px-2 py-1 md:px-3 md:py-2 bg-black/90 border border-white text-[10px] md:text-xs hover:bg-white hover:text-black transition-colors rounded-full z-10">
  TAP TO SEE BEFORE
    </button>
    
    <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex gap-2 z-10">
      <button id="zoomOut" class="p-2 bg-white text-black hover:bg-gray-200 border-2 border-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="8" y1="11" x2="14" y2="11"></line>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
      <span id="zoomLevel" class="px-4 py-2 bg-white text-black border-2 border-white text-sm">100%</span>
      <button id="zoomIn" class="p-2 bg-white text-black hover:bg-gray-200 border-2 border-white">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="11" y1="8" x2="11" y2="14"></line>
          <line x1="8" y1="11" x2="14" y2="11"></line>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>
    
    <img id="viewerImage" src="" alt="Enlarged view">
  </div>

  <!-- Add Gallery Item Modal -->
  <div id="addGalleryModal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl mb-4">[Add New Project]</h2>
      <div class="space-y-3">
        <div>
          <label class="text-xs block mb-1">Before Image URL</label>
          <input type="text" id="newBeforeImage" placeholder="https://..." class="w-full px-3 py-2 border-2 border-white bg-transparent text-white text-sm">
        </div>
        <div>
          <label class="text-xs block mb-1">After Image URL</label>
          <input type="text" id="newAfterImage" placeholder="https://..." class="w-full px-3 py-2 border-2 border-white bg-transparent text-white text-sm">
        </div>
      </div>
      <div class="flex gap-2 mt-4">
        <button id="addGallerySubmit" class="flex-1 px-4 py-2 border-2 border-white hover:bg-white hover:text-black transition-colors">Add</button>
        <button id="addGalleryCancel" class="flex-1 px-4 py-2 border-2 border-white hover:bg-white hover:text-black transition-colors">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add Social Link Modal -->
  <div id="addSocialModal" class="modal">
    <div class="modal-content">
     <h2 class="text-xl mb-4">[Add Social Link]</h2>
      <div class="space-y-3">
        <div>
          <label class="text-xs block mb-1">Icon Image URL</label>
          <input type="text" id="newSocialIcon" placeholder="https://..." class="w-full px-3 py-2 border-2 border-white bg-transparent text-white text-sm">
        </div>
        <div>
          <label class="text-xs block mb-1">Website URL</label>
          <input type="text" id="newSocialUrl" placeholder="https://..." class="w-full px-3 py-2 border-2 border-white bg-transparent text-white text-sm">
        </div>
      </div>
      <div class="flex gap-2 mt-4">
        <button id="addSocialSubmit" class="flex-1 px-4 py-2 border-2 border-white hover:bg-white hover:text-black transition-colors">Add</button>
        <button id="addSocialCancel" class="flex-1 px-4 py-2 border-2 border-white hover:bg-white hover:text-black transition-colors">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Edit Social Link Modal -->
  <div id="editSocialModal" class="modal">
    <div class="modal-content">
      <h2 class="text-xl mb-4">[Edit Social Link]</h2>
      <div class="space-y-3">
        <div>
          <label class="text-xs block mb-1">Icon Image URL</label>
          <input type="text" id="editSocialIcon" placeholder="https://..." class="w-full px-3 py-2 border-2 border-white bg-transparent text-white text-sm">
        </div>
        <div>
          <label class="text-xs block mb-1">Website URL</label>
          <input type="text" id="editSocialUrl" placeholder="https://..." class="w-full px-3 py-2 border-2 border-white bg-transparent text-white text-sm">
        </div>
      </div>
      <div class="flex gap-2 mt-4">
        <button id="editSocialSubmit" class="flex-1 px-4 py-2 border-2 border-white hover:bg-white hover:text-black transition-colors">Save</button>
        <button id="editSocialDelete" class="flex-1 px-4 py-2 border-2 border-red-500 text-red-500 hover:bg-red-500 hover:text-black transition-colors">Delete</button>
        <button id="editSocialCancel" class="flex-1 px-4 py-2 border-2 border-white hover:bg-white hover:text-black transition-colors">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="border-t-2 border-[var(--foreground)] bg-[var(--background)]">
    <div class="container mx-auto px-4 py-6 text-center">
      <p class="text-xs text-[var(--muted-foreground)]">[PORTFOLIO © 2026] — DESIGNED WITH PRECISION</p>
    </div>
  </footer>

  <script>
    // App State
    let state = {
      isEditMode: false,
      profile: {
        image: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400&h=400&fit=crop',
        name: 'SAM',
        bio: <pr>
                 •Photographer <br>
                 •Visual Artist <br> 
                  transformin RAW moments into Cinematic Visuals
             <pr>
      },
      socialLinks: [],
      gallery: [],
      currentViewer: {
        beforeImage: '',
        afterImage: '',
        showBefore: false,
        zoom: 1
      }
    };

    let currentEditingSocialIndex = null;

    // Load gallery from images.json
    async function loadGalleryFromJSON() {
      try {
        const response = await fetch('images.json');
        const data = await response.json();
        
        // Check if there are custom gallery items in localStorage
        const saved = localStorage.getItem('portfolioState');
        if (saved) {
          const parsed = JSON.parse(saved);
          // Merge: use localStorage gallery if exists, otherwise use JSON
          if (parsed.gallery && parsed.gallery.length > 0) {
            state.gallery = parsed.gallery;
          } else {
            state.gallery = data.gallery || [];
          }
        } else {
          state.gallery = data.gallery || [];
        }
        
        renderGallery();
      } catch (error) {
        console.error('Error loading images.json:', error);
        // Fallback to localStorage or empty array
        const saved = localStorage.getItem('portfolioState');
        if (saved) {
          const parsed = JSON.parse(saved);
          state.gallery = parsed.gallery || [];
        }
        renderGallery();
      }
    }

    // Load state from localStorage
    function loadState() {
      const saved = localStorage.getItem('portfolioState');
      if (saved) {
        const parsed = JSON.parse(saved);
        state.profile = parsed.profile || state.profile;
        state.socialLinks = parsed.socialLinks || state.socialLinks;
        // Gallery is loaded from JSON, so we don't overwrite it here
      }
    }
    
    const saveGalleryBtn = document.getElementById('saveGalleryBtn');
    // Save state to localStorage
    function saveState() {
      localStorage.setItem('portfolioState', JSON.stringify({
        profile: state.profile,
        socialLinks: state.socialLinks,
        gallery: state.gallery
      }));
    }

    saveGalleryBtn.addEventListener('click', () => {
      saveState();
      alert("Gallery saved successfully");
    });

    // Admin authentication
    document.getElementById('adminBtn').addEventListener('click', () => {
      document.getElementById('adminModal').classList.add('active');
      document.getElementById('adminPassword').value = '';
      document.getElementById('adminError').classList.add('hidden');
    });

    document.getElementById('adminCancel').addEventListener('click', () => {
      document.getElementById('adminModal').classList.remove('active');
    });

    document.getElementById('adminSubmit').addEventListener('click', () => {
      const password = document.getElementById('adminPassword').value;
      if (password === '120104') {
        state.isEditMode = true;
        document.getElementById('adminModal').classList.remove('active');
        updateEditMode();
      } else {
        document.getElementById('adminError').classList.remove('hidden');
      }
    });

    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('adminSubmit').click();
      }
    });

    // Update Edit Mode UI
    function updateEditMode() {
      if (state.isEditMode) {
        document.getElementById('editModeIndicator').classList.remove('hidden');
        document.getElementById('addGalleryBtn').classList.remove('hidden');
        document.getElementById('saveGalleryBtn').classList.remove('hidden');
        
        // Make profile editable
        const profileName = document.getElementById('profileName');
        const profileBio = document.getElementById('profileBio');
        profileName.contentEditable = true;
        profileBio.contentEditable = true;
        
        profileName.addEventListener('blur', () => {
          state.profile.name = profileName.textContent;
          saveState();
        });
        
        profileBio.addEventListener('blur', () => {
          state.profile.bio = profileBio.textContent;
          saveState();
        });
        
        // Profile picture click to edit
        document.getElementById('profilePicContainer').addEventListener('click', () => {
          const newUrl = prompt('Enter new profile image URL:', state.profile.image);
          if (newUrl) {
            state.profile.image = newUrl;
            document.getElementById('profilePic').src = newUrl;
            saveState();
          }
        });
      } else {
        document.getElementById('editModeIndicator').classList.add('hidden');
        document.getElementById('addGalleryBtn').classList.add('hidden');
        document.getElementById('saveGalleryBtn').classList.add('hidden');
      }
      renderSocialLinks();
      renderGallery();
    }

    // Social Links
    function renderSocialLinks() {
  const container = document.getElementById('socialLinks');
  container.innerHTML = '';

  state.socialLinks.forEach((link, index) => {
    const btn = document.createElement('button');
    btn.className = 'p-1 border border-white hover:bg-white hover:text-black transition-colors';

    // Image for icon
    const img = document.createElement('img');
    img.src = link.icon;  // button pe dikhne wala icon
    img.alt = 'icon';
    img.className = 'w-5 h-5 object-contain';
    btn.appendChild(img);

    if (state.isEditMode) {
      btn.addEventListener('click', () => openEditSocialModal(index));
    } else {
      btn.addEventListener('click', () => {
        window.open(link.url.startsWith('http') ? link.url : `https://${link.url}`, '_blank');
      });
    }

    container.appendChild(btn);
  });

     // Add button in edit mode
     if (state.isEditMode && state.socialLinks.length < 15) {
       const addBtn = document.createElement('button');
       addBtn.className = 'p-1 border border-dashed border-white hover:bg-white hover:text-black transition-colors text-xs';
       addBtn.innerHTML = '+';
       addBtn.addEventListener('click', openAddSocialModal);
       container.appendChild(addBtn);
     }
   }

    function openAddSocialModal() {
      document.getElementById('addSocialModal').classList.add('active');
      document.getElementById('newSocialIcon').value = '';
      document.getElementById('newSocialUrl').value = '';
    }

    document.getElementById('addSocialCancel').addEventListener('click', () => {
      document.getElementById('addSocialModal').classList.remove('active');
    });

    document.getElementById('addSocialSubmit').addEventListener('click', () => {
      const icon = document.getElementById('newSocialIcon').value.trim();
      const url = document.getElementById('newSocialUrl').value.trim();
      
      if (icon && url) {
        state.socialLinks.push({ icon, url });
        saveState();
        renderSocialLinks();
        document.getElementById('addSocialModal').classList.remove('active');
      }
    });

    function openEditSocialModal(index) {
      currentEditingSocialIndex = index;
      const link = state.socialLinks[index];
      document.getElementById('editSocialIcon').value = link.icon;
      document.getElementById('editSocialUrl').value = link.url;
      document.getElementById('editSocialModal').classList.add('active');
    }

    document.getElementById('editSocialCancel').addEventListener('click', () => {
      document.getElementById('editSocialModal').classList.remove('active');
      currentEditingSocialIndex = null;
    });

    document.getElementById('editSocialSubmit').addEventListener('click', () => {
      const icon = document.getElementById('editSocialIcon').value.trim();
      const url = document.getElementById('editSocialUrl').value.trim();
      
      if (icon && url && currentEditingSocialIndex !== null) {
        state.socialLinks[currentEditingSocialIndex] = { icon, url };
        saveState();
        renderSocialLinks();
        document.getElementById('editSocialModal').classList.remove('active');
        currentEditingSocialIndex = null;
      }
    });

    document.getElementById('editSocialDelete').addEventListener('click', () => {
      if (currentEditingSocialIndex !== null) {
        state.socialLinks.splice(currentEditingSocialIndex, 1);
        saveState();
        renderSocialLinks();
        document.getElementById('editSocialModal').classList.remove('active');
        currentEditingSocialIndex = null;
      }
    });

    // Gallery
    function renderGallery() {
      const container = document.getElementById('galleryGrid');
      const col1 = document.getElementById('col1');
      const col2 = document.getElementById('col2');

      col1.innerHTML = '';
      col2.innerHTML = '';
      
      state.gallery.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'relative border border-white/10 bg-black overflow-hidden group';
        card.draggable = state.isEditMode;
        card.dataset.index = index;
        
        const imageWrapper = document.createElement('div');
        imageWrapper.className = 'w-full cursor-pointer overflow-hidden';
        
        const img = document.createElement('img');
        img.src = item.afterImage;
        img.alt = 'Gallery item';
        img.className = 'w-full h-auto object-contain progressive-img transition-transform duration-500 ease-out group-hover:scale-105';
        img.dataset.before = item.beforeImage;
        img.dataset.after = item.afterImage;
        img.loading = "lazy";

        /* preload both images together */
        const preloadAfter = new Image();
        preloadAfter.src = item.afterImage;

        const preloadBefore = new Image();
        preloadBefore.src = item.beforeImage;

        img.onload = () => {
          img.classList.add("loaded");
        };

        imageWrapper.appendChild(img);
        
        const toggleBtn = document.createElement('button');
        // Mobile: px-2 py-0.5, text-[10px] | Desktop (md): px-3 py-1, text-xs
        toggleBtn.className = 'absolute bottom-2 left-2 px-2 py-0.5 md:px-3 md:py-1 text-[10px] md:text-xs text-white bg-black/25 backdrop-blur-lg border border-white/15 hover:bg-white/40 hover:text-black transition-all duration-300 rounded-full';
        toggleBtn.textContent = 'TAP TO SEE BEFORE';
        
        let showingBefore = false;
        toggleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showingBefore = !showingBefore;
          img.src = showingBefore ? item.beforeImage : item.afterImage;
          toggleBtn.textContent = showingBefore ? 'TAP TO SEE AFTER' : 'TAP TO SEE BEFORE';
        });
        
        imageWrapper.addEventListener('click', () => {
          openImageViewer(item.beforeImage, item.afterImage);
        });
        
        card.appendChild(imageWrapper);
        card.appendChild(toggleBtn);
        
        // Edit mode features
        if (state.isEditMode) {
          const editOverlay = document.createElement('div');
          editOverlay.className = 'absolute top-2 right-2 flex gap-2';
          
          const editBtn = document.createElement('button');
          editBtn.className = 'p-2 bg-blue-500 text-white text-xs border border-blue-500 hover:bg-blue-600';
          editBtn.textContent = 'Edit';
          editBtn.addEventListener('click', () => editGalleryItem(index));
          
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'p-2 bg-red-500 text-white text-xs border border-red-500 hover:bg-red-600';
          deleteBtn.textContent = 'Del';
          deleteBtn.addEventListener('click', () => deleteGalleryItem(index));
          
          editOverlay.appendChild(editBtn);
          editOverlay.appendChild(deleteBtn);
          card.appendChild(editOverlay);
          
          // Drag and drop
          card.addEventListener('dragstart', handleDragStart);
          card.addEventListener('dragover', handleDragOver);
          card.addEventListener('drop', handleDrop);
          card.addEventListener('dragend', handleDragEnd);
        }
        
        if (index % 2 === 0) {
          col1.appendChild(card);
        } else {
          col2.appendChild(card);
            }
      });
    }

    let draggedIndex = null;

    function handleDragStart(e) {
      draggedIndex = parseInt(e.target.dataset.index);
      e.target.classList.add('dragging');
    }

    function handleDragOver(e) {
      e.preventDefault();
      const target = e.target.closest('[data-index]');
      if (target) {
        target.classList.add('drag-over');
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      const target = e.target.closest('[data-index]');
      if (target) {
        target.classList.remove('drag-over');
        const dropIndex = parseInt(target.dataset.index);
        
        if (draggedIndex !== null && draggedIndex !== dropIndex) {
          const item = state.gallery.splice(draggedIndex, 1)[0];
          state.gallery.splice(dropIndex, 0, item);
          saveState();
          renderGallery();
        }
      }
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      draggedIndex = null;
    }

    function editGalleryItem(index) {
      const item = state.gallery[index];
      const newBefore = prompt('Enter Before image URL:', item.beforeImage);
      if (newBefore !== null) {
        const newAfter = prompt('Enter After image URL:', item.afterImage);
        if (newAfter !== null) {
          state.gallery[index] = {
            id: item.id,
            beforeImage: newBefore,
            afterImage: newAfter
          };
          saveState();
          renderGallery();
        }
      }
    }

    function deleteGalleryItem(index) {
      if (confirm('Delete this gallery item?')) {
        state.gallery.splice(index, 1);
        saveState();
        renderGallery();
      }
    }

    // Add Gallery Item
    document.getElementById('addGalleryBtn').addEventListener('click', () => {
      document.getElementById('addGalleryModal').classList.add('active');
      document.getElementById('newBeforeImage').value = '';
      document.getElementById('newAfterImage').value = '';
    });

    document.getElementById('addGalleryCancel').addEventListener('click', () => {
      document.getElementById('addGalleryModal').classList.remove('active');
    });

    document.getElementById('addGallerySubmit').addEventListener('click', () => {
      const before = document.getElementById('newBeforeImage').value.trim();
      const after = document.getElementById('newAfterImage').value.trim();
      
      if (before && after) {
        state.gallery.push({
          id: Date.now().toString(),
          beforeImage: before,
          afterImage: after
        });
        saveState();
        renderGallery();
        document.getElementById('addGalleryModal').classList.remove('active');
      }
    });

    // Image Viewer
    function openImageViewer(beforeImage, afterImage) {
      state.currentViewer = {
        beforeImage,
        afterImage,
        showBefore: false,
        zoom: 1
      };
      
      const viewer = document.getElementById('imageViewer');
      const img = document.getElementById('viewerImage');
      const toggleBtn = document.getElementById('toggleViewerImage');
      
      img.src = afterImage;
      toggleBtn.textContent = 'TAP TO SEE BEFORE';
      viewer.classList.add('active');
      updateZoomDisplay();
    }

    document.getElementById('closeViewer').addEventListener('click', () => {
      document.getElementById('imageViewer').classList.remove('active');
      state.currentViewer.zoom = 1;
      document.getElementById('viewerImage').style.transform = 'scale(1)';
    });

    document.getElementById('toggleViewerImage').addEventListener('click', () => {
      state.currentViewer.showBefore = !state.currentViewer.showBefore;
      const img = document.getElementById('viewerImage');
      const toggleBtn = document.getElementById('toggleViewerImage');
      
      img.src = state.currentViewer.showBefore ? state.currentViewer.beforeImage : state.currentViewer.afterImage;
      toggleBtn.textContent = state.currentViewer.showBefore ? 'TAP TO SEE AFTER' : 'TAP TO SEE BEFORE';
    });

    document.getElementById('zoomIn').addEventListener('click', () => {
      state.currentViewer.zoom = Math.min(state.currentViewer.zoom + 0.25, 3);
      updateZoom();
    });

    document.getElementById('zoomOut').addEventListener('click', () => {
      state.currentViewer.zoom = Math.max(state.currentViewer.zoom - 0.25, 0.5);
      updateZoom();
    });

    function updateZoom() {
      const img = document.getElementById('viewerImage');
      img.style.transform = `scale(${state.currentViewer.zoom})`;
      updateZoomDisplay();
    }

    function updateZoomDisplay() {
      document.getElementById('zoomLevel').textContent = `${Math.round(state.currentViewer.zoom * 100)}%`;
    }

    // Initialize
    loadState();
    loadGalleryFromJSON(); // Load gallery from images.json
    document.getElementById('profilePic').src = state.profile.image;
    document.getElementById('profileName').textContent = state.profile.name;
    document.getElementById('profileBio').textContent = state.profile.bio;
    renderSocialLinks();

    // ─── GitHub Auto-Sync ──────────────────────────────────────────────────────
    const GITHUB_TOKEN = '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';
    const GITHUB_OWNER = 'sahil-aditya';
    const GITHUB_REPO  = 'portfolio';
    const GITHUB_BRANCH = 'main';

    const GH_HEADERS = {
      'Authorization': `token ${GITHUB_TOKEN}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };

    async function githubGetFileSha(path) {
      try {
        const res = await fetch(
          `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`,
          { headers: GH_HEADERS }
        );
        if (!res.ok) return null;
        const data = await res.json();
        return data.sha || null;
      } catch (e) {
        return null;
      }
    }

    async function githubPutFile(path, content, commitMessage) {
      const sha = await githubGetFileSha(path);
      const body = {
        message: commitMessage,
        content: btoa(unescape(encodeURIComponent(content))),
        branch: GITHUB_BRANCH
      };
      if (sha) body.sha = sha;
      const res = await fetch(
        `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`,
        { method: 'PUT', headers: GH_HEADERS, body: JSON.stringify(body) }
      );
      return res.ok;
    }

    async function githubGetFileContent(path) {
      try {
        const res = await fetch(
          `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`,
          { headers: GH_HEADERS }
        );
        if (!res.ok) return null;
        const data = await res.json();
        return decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
      } catch (e) {
        return null;
      }
    }

    function buildUpdatedIndexHtml(htmlSource, newProfile, newSocialLinks) {
      let updated = htmlSource;

      // Update profile image src
      updated = updated.replace(
        /(<img\s+id="profilePic"[^>]*src=")[^"]*(")/,
        `$1${newProfile.image}$2`
      );

      // Update profile name text content
      updated = updated.replace(
        /(<h2\s+id="profileName"[^>]*>)[^<]*(<\/h2>)/,
        `$1${newProfile.name}$2`
      );

      // Update profile bio text content (between tags, handle whitespace)
      updated = updated.replace(
        /(<p\s+id="profileBio"[^>]*>)[\s\S]*?(<\/p>)/,
        `$1${newProfile.bio}$2`
      );

      // Update state.profile.image default in JS
      updated = updated.replace(
        /(image:\s*')[^']*('),/,
        `$1${newProfile.image}$2,`
      );

      // Update state.profile.name default in JS
      updated = updated.replace(
        /(name:\s*')[^']*('),/,
        `$1${newProfile.name}$2,`
      );

      // Update socialLinks initial array — replace the social links block
      const socialJson = JSON.stringify(newSocialLinks);
      updated = updated.replace(
        /(socialLinks:\s*)\[[^\]]*\]/,
        `$1${socialJson}`
      );

      return updated;
    }

    async function syncProfileToGitHub() {
      if (!state.isEditMode) return;
      const htmlSource = await githubGetFileContent('index.html');
      if (!htmlSource) {
        console.warn('GitHub sync: could not fetch index.html');
        return;
      }
      const updated = buildUpdatedIndexHtml(htmlSource, state.profile, state.socialLinks);
      const ok = await githubPutFile('index.html', updated, 'Update profile via portfolio editor');
      if (ok) console.log('GitHub sync: index.html updated successfully');
      else console.warn('GitHub sync: failed to update index.html');
    }

    async function syncGalleryToGitHub() {
      if (!state.isEditMode) return;
      const content = JSON.stringify({ gallery: state.gallery }, null, 2);
      const ok = await githubPutFile('images.json', content, 'Update gallery via portfolio editor');
      if (ok) console.log('GitHub sync: images.json updated successfully');
      else console.warn('GitHub sync: failed to update images.json');
    }

    // Debounce helper to avoid flooding GitHub API
    function debounce(fn, delay) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    const debouncedSyncProfile = debounce(syncProfileToGitHub, 2000);
    const debouncedSyncGallery = debounce(syncGalleryToGitHub, 2000);

    // ── Patch saveState to also trigger GitHub sync ──────────────────────────
    const _originalSaveState = saveState;
    saveState = function() {
      _originalSaveState();
      debouncedSyncProfile();
    };

    // ── Patch gallery save button to also sync gallery ────────────────────────
    saveGalleryBtn.addEventListener('click', () => {
      debouncedSyncGallery();
    });

    // ── Patch addGallerySubmit to sync gallery after adding ───────────────────
    const _origAddGallerySubmit = document.getElementById('addGallerySubmit');
    _origAddGallerySubmit.addEventListener('click', () => {
      setTimeout(() => {
        if (state.isEditMode) debouncedSyncGallery();
      }, 100);
    });

    // ── Patch deleteGalleryItem to also sync gallery ──────────────────────────
    const _origDeleteGalleryItem = deleteGalleryItem;
    deleteGalleryItem = function(index) {
      _origDeleteGalleryItem(index);
      if (state.isEditMode) debouncedSyncGallery();
    };

    // ── Patch editGalleryItem to also sync gallery ────────────────────────────
    const _origEditGalleryItem = editGalleryItem;
    editGalleryItem = function(index) {
      _origEditGalleryItem(index);
      if (state.isEditMode) debouncedSyncGallery();
    };
    // ──────────────────────────────────────────────────────────────────────────
  </script>
</body>
